<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Aprovação - Hidrogest</title>
    
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #F0F4F8; /* Fallback */
        }
        /* Utilitário para esconder em mobile se necessário */
        @media (max-width: 768px) {
            .md-show { display: none !important; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef } from 'https://esm.sh/react@18';
        import { createRoot } from 'https://esm.sh/react-dom@18/client';
        
        // Importando ícones do Lucide
        import {
            Download, Instagram, Linkedin, Heart, MessageCircle, Send, Bookmark,
            ThumbsUp, Repeat2, Lightbulb, MoreHorizontal, Globe, Moon, Sun,
            Grid, PlaySquare, UserSquare, Link as LinkIcon, Mail, Phone,
            MessageSquare, CheckCircle2, ChevronLeft, LogOut, ChevronDown,
            FileText, Clock, AlertCircle, Check, X, Zap, Eye, Copy, ExternalLink
        } from 'https://esm.sh/lucide-react@0.292.0';

        // Importando Firebase
        import { initializeApp } from 'https://esm.sh/firebase@10.6.0/app';
        import {
            getAuth, onAuthStateChanged, signInWithCustomToken, signInAnonymously,
            GoogleAuthProvider, signInWithPopup, signOut
        } from 'https://esm.sh/firebase@10.6.0/auth';
        import { getFirestore, collection, addDoc, onSnapshot, serverTimestamp } from 'https://esm.sh/firebase@10.6.0/firestore';

        // Cole as chaves do seu Firebase aqui caso for usar fora de um ambiente injetado
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
            // apiKey: "SUA_API_KEY",
            // authDomain: "SEU_DOMAIN",
            // projectId: "SEU_PROJECT_ID"
        };
        
        // Prevenir inicialização com config vazia para não quebrar a UI
        let app, auth, db;
        try {
            app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            db = getFirestore(app);
        } catch(e) {
            console.warn("Firebase não configurado completamente. Certifique-se de adicionar suas credenciais.");
        }

        const appId = typeof __app_id !== 'undefined' ? __app_id : 'sistema-aprovacao-copy';

        const brand = {
            lightBlue: '#55BBDF',
            darkBlue: '#153D56',
            darkGreen: '#00524D',
            mediumGreen: '#659368',
            lightGreen: '#CFDDBA',
        };

        const logoUrl = "https://drive.google.com/thumbnail?id=1N19BuQD2EAwpsGJBu85561u67orNR92h&sz=w1000";

        const instaProfile = {
            username: "hidrogest_engenharia",
            name: "Hidrogest Engenharia e Consultoria",
            posts: 74,
            followers: 295,
            following: 88,
            category: "Produto/serviço",
            bio: ["• Batimetria", "• Hidrometria", "• Monitoramento e qualidade de água", "• Operação e Manut. de equipamento... mais"],
            address: "Rua Contria, 769, Alto Barroca., Belo Horizonte, Brazil 30431-028",
            link: "linktr.ee/hidrogest"
        };

        const portfolioData = [
            {
                id: 1,
                title: "Bacia Hidrográfica",
                platform: "Instagram + LinkedIn",
                status: "pending",
                statusLabel: "Aguardando Avaliação",
                author: "Hidrogest Engenharia e Consultoria",
                role: "Engenharia e Meio Ambiente",
                avatar: "https://drive.google.com/thumbnail?id=1N19BuQD2EAwpsGJBu85561u67orNR92h&sz=w200",
                caption: `Imagine um grande funil esculpido pelo próprio relevo: essa é a dinâmica de uma bacia hidrográfica! 💧\n\nA topografia do terreno atua como um sistema de captação. Toda a água da chuva que cai nessa área converge pelas encostas até um único ponto de saída, formando o nosso rio principal. É exatamente esse "efeito funil" que dita o equilíbrio dos nossos ecossistemas e garante o abastecimento de água.\n\nVocê sabe a qual bacia hidrográfica o seu município pertence? Conta aqui para mim! 👇\n\n#GeografiaFisica #RecursosHidricos #BaciasHidrograficas #GestaoAmbiental`,
                marketingNote: `Sugiro mantermos o termo "funil" na copy por uma questão estratégica de retenção e economia cognitiva. \n\nEm vídeos curtos, precisamos de um gancho visual imediato nos primeiros segundos, e a palavra "funil" traduz a complexidade topográfica de uma bacia hidrográfica em uma imagem mental instantânea que qualquer pessoa compreende sem esforço. Isso prende a atenção do usuário, facilita muito a inserção de elementos gráficos na edição do Reel e tangibiliza a dinâmica do relevo de forma didática.\n\nA ideia é usar essa analogia apenas como uma isca inicial para impedir que o público pule o vídeo e, logo na sequência, entregar a autoridade e o conceito técnico correto, garantindo engajamento sem perder o tom profissional.`,
                imageUrl: "https://drive.google.com/thumbnail?id=10YhCxnMMyVKty0uUbGLeuR7hIOFxe7uz&sz=w1000",
                fallbackUrl: "https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?q=80&w=1080&auto=format&fit=crop",
                date: "15 Mai 2025"
            }
        ];

        const StatusBadge = ({ status, label, isDark }) => {
            const map = {
                pending:  { bg: isDark ? 'rgba(251,191,36,0.12)' : '#FEFCE8', color: isDark ? '#FCD34D' : '#92400E', dot: '#F59E0B', border: isDark ? 'rgba(251,191,36,0.25)' : '#FDE68A' },
                approved: { bg: isDark ? 'rgba(52,211,153,0.12)' : '#F0FDF4', color: isDark ? '#6EE7B7' : '#065F46', dot: '#10B981', border: isDark ? 'rgba(52,211,153,0.25)' : '#A7F3D0' },
                rejected: { bg: isDark ? 'rgba(248,113,113,0.12)' : '#FFF1F2', color: isDark ? '#FCA5A5' : '#881337', dot: '#EF4444', border: isDark ? 'rgba(248,113,113,0.25)' : '#FECDD3' },
            };
            const s = map[status] || map.pending;
            return (
                <span style={{
                    display: 'inline-flex', alignItems: 'center', gap: 6,
                    background: s.bg, color: s.color,
                    border: `1px solid ${s.border}`,
                    padding: '4px 12px', borderRadius: 999, fontSize: 12, fontWeight: 600, whiteSpace: 'nowrap'
                }}>
                    <span style={{ width: 6, height: 6, borderRadius: '50%', background: s.dot, flexShrink: 0 }} />
                    {label}
                </span>
            );
        };

        const handleDownload = async (url, fallbackUrl, filename) => {
            try {
                const r = await fetch(url);
                if (!r.ok) throw new Error();
                const blob = await r.blob();
                const bu = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = bu; a.download = filename || 'post.jpg';
                document.body.appendChild(a); a.click();
                document.body.removeChild(a); window.URL.revokeObjectURL(bu);
            } catch { window.open(url, '_blank'); }
        };

        const handleImgErr = (e, fb) => { e.target.src = fb; };

        const useCopyToast = () => {
            const [copied, setCopied] = useState(false);
            const copy = (text) => {
                navigator.clipboard.writeText(text).then(() => {
                    setCopied(true);
                    setTimeout(() => setCopied(false), 2000);
                });
            };
            return { copied, copy };
        };

        const PostFeedback = ({ postId, isDark, user }) => {
            const [comments, setComments] = useState([]);
            const [newComment, setNewComment] = useState('');
            const [sending, setSending] = useState(false);

            useEffect(() => {
                if (!user || !db) return;
                try {
                    const ref = collection(db, 'artifacts', appId, 'public', 'data', `post_comments_${postId}`);
                    const unsub = onSnapshot(ref, snap => {
                        const data = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                        data.sort((a, b) => (b.createdAt?.toMillis() || 0) - (a.createdAt?.toMillis() || 0));
                        setComments(data);
                    }, err => console.error(err));
                    return () => unsub();
                } catch(e) { console.error("Firestore não inicializado corretamente", e); }
            }, [user, postId]);

            const submit = async (e) => {
                e.preventDefault();
                if (!newComment.trim() || !user || !db) return;
                setSending(true);
                try {
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', `post_comments_${postId}`), {
                        text: newComment,
                        userId: user.uid,
                        userName: user.isAnonymous ? 'Visitante' : (user.displayName || 'Usuário'),
                        userPhoto: user.photoURL || `https://ui-avatars.com/api/?name=${(user.displayName || 'U').charAt(0)}&background=153D56&color=fff`,
                        createdAt: serverTimestamp()
                    });
                    setNewComment('');
                } catch (e) { console.error(e); }
                setSending(false);
            };

            const isGoogle = user && !user.isAnonymous;
            const cardBg = isDark ? 'rgba(255,255,255,0.03)' : '#F8FAFC';
            const border = isDark ? 'rgba(255,255,255,0.07)' : '#E2E8F0';
            const textSecondary = isDark ? '#94A3B8' : '#64748B';

            return (
                <div style={{ borderTop: `1px solid ${border}` }}>
                    {/* Approval bar */}
                    <div style={{
                        display: 'flex', flexWrap: 'wrap', gap: 16, alignItems: 'center', justifyContent: 'space-between',
                        padding: '20px 28px',
                        background: isDark ? 'rgba(85,187,223,0.06)' : 'rgba(0,82,77,0.04)',
                        borderBottom: `1px solid ${border}`
                    }}>
                        <div>
                            <p style={{ fontWeight: 700, fontSize: 15, color: isDark ? '#E2E8F0' : '#0F172A', display: 'flex', alignItems: 'center', gap: 8, margin: 0 }}>
                                <CheckCircle2 size={17} style={{ color: '#10B981' }} />
                                Aprovar ou Solicitar Ajustes
                            </p>
                            <p style={{ fontSize: 13, color: textSecondary, margin: '4px 0 0' }}>
                                Comunique-se com o produtor diretamente pelo canal preferido.
                            </p>
                        </div>
                        <div style={{ display: 'flex', gap: 10 }}>
                            <a
                                href={`https://wa.me/5531985547183?text=Olá Felipe! Sobre o post ${postId}...`}
                                target="_blank" rel="noreferrer"
                                style={{
                                    display: 'flex', alignItems: 'center', gap: 7,
                                    background: '#22C55E', color: '#fff',
                                    padding: '9px 18px', borderRadius: 10, fontWeight: 700, fontSize: 13,
                                    textDecoration: 'none', transition: 'opacity .15s'
                                }}
                            >
                                <Phone size={14} /> WhatsApp
                            </a>
                            <a
                                href={`mailto:canellifelipe@gmail.com?subject=Aprovação - Post ${postId}`}
                                style={{
                                    display: 'flex', alignItems: 'center', gap: 7,
                                    background: isDark ? 'rgba(255,255,255,0.07)' : '#fff',
                                    color: isDark ? '#E2E8F0' : '#153D56',
                                    border: `1px solid ${border}`,
                                    padding: '9px 18px', borderRadius: 10, fontWeight: 700, fontSize: 13,
                                    textDecoration: 'none'
                                }}
                            >
                                <Mail size={14} /> E-mail
                            </a>
                        </div>
                    </div>

                    {/* Comments */}
                    <div style={{ padding: '24px 28px' }}>
                        <h4 style={{ fontSize: 14, fontWeight: 700, color: isDark ? '#E2E8F0' : '#1E293B', display: 'flex', alignItems: 'center', gap: 8, margin: '0 0 18px' }}>
                            <MessageSquare size={15} style={{ color: isDark ? '#55BBDF' : '#00524D' }} />
                            Comentários & Notas Internas
                        </h4>

                        <div style={{ background: cardBg, border: `1px solid ${border}`, borderRadius: 14, padding: 16, marginBottom: 18 }}>
                            {!isGoogle ? (
                                <div style={{ textAlign: 'center', padding: '12px 0' }}>
                                    <p style={{ fontSize: 13, color: textSecondary, margin: 0 }}>
                                        Faça login com Google para adicionar notas ou pedir ajustes.
                                    </p>
                                </div>
                            ) : (
                                <form onSubmit={submit}>
                                    <div style={{ display: 'flex', gap: 12, alignItems: 'flex-start' }}>
                                        <img src={user.photoURL} alt="" style={{ width: 34, height: 34, borderRadius: '50%', flexShrink: 0 }} />
                                        <div style={{ flex: 1 }}>
                                            <textarea
                                                value={newComment}
                                                onChange={e => setNewComment(e.target.value)}
                                                placeholder="Adicione uma nota ou pedido de ajuste..."
                                                style={{
                                                    width: '100%', padding: '10px 14px', borderRadius: 10,
                                                    border: `1px solid ${border}`,
                                                    background: isDark ? 'rgba(15,23,42,0.6)' : '#fff',
                                                    color: isDark ? '#E2E8F0' : '#1E293B',
                                                    fontSize: 13, resize: 'none', height: 76, outline: 'none',
                                                    fontFamily: 'inherit', boxSizing: 'border-box'
                                                }}
                                            />
                                            <div style={{ display: 'flex', justifyContent: 'flex-end', marginTop: 8 }}>
                                                <button
                                                    type="submit"
                                                    disabled={sending || !newComment.trim()}
                                                    style={{
                                                        padding: '8px 18px', borderRadius: 9, fontWeight: 700, fontSize: 13,
                                                        background: (!sending && newComment.trim())
                                                            ? (isDark ? '#55BBDF' : '#153D56') : (isDark ? '#334155' : '#CBD5E1'),
                                                        color: (!sending && newComment.trim())
                                                            ? (isDark ? '#0F172A' : '#fff') : (isDark ? '#64748B' : '#94A3B8'),
                                                        border: 'none', cursor: sending || !newComment.trim() ? 'not-allowed' : 'pointer',
                                                        transition: 'all .15s'
                                                    }}
                                                >
                                                    {sending ? 'Enviando…' : 'Postar Nota'}
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                </form>
                            )}
                        </div>

                        <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
                            {comments.length === 0 ? (
                                <p style={{ fontSize: 13, color: textSecondary, fontStyle: 'italic', margin: 0 }}>
                                    Nenhuma nota ainda para esta publicação.
                                </p>
                            ) : comments.map(c => (
                                <div key={c.id} style={{
                                    display: 'flex', gap: 12, padding: '14px 16px',
                                    background: isDark ? 'rgba(255,255,255,0.03)' : '#fff',
                                    border: `1px solid ${border}`, borderRadius: 12
                                }}>
                                    <img src={c.userPhoto} alt="" style={{ width: 32, height: 32, borderRadius: '50%', flexShrink: 0 }} />
                                    <div>
                                        <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 4 }}>
                                            <span style={{ fontWeight: 700, fontSize: 13, color: isDark ? '#E2E8F0' : '#1E293B' }}>{c.userName}</span>
                                            <span style={{ fontSize: 11, color: textSecondary }}>
                                                {c.createdAt ? new Date(c.createdAt.toMillis()).toLocaleString('pt-BR') : 'agora'}
                                            </span>
                                        </div>
                                        <p style={{ fontSize: 13, color: isDark ? '#CBD5E1' : '#475569', margin: 0, lineHeight: 1.6 }}>{c.text}</p>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        };

        const InstagramMockup = ({ post, isDark }) => {
            const [view, setView] = useState('profile');
            const bg = isDark ? '#000' : '#fff';
            const surface = isDark ? '#1C1C1E' : '#F5F5F5';
            const border = isDark ? '#2C2C2E' : '#DBDBDB';
            const text = isDark ? '#fff' : '#000';
            const muted = isDark ? '#8E8E8E' : '#8E8E8E';

            return (
                <div style={{
                    background: bg, borderRadius: 16, border: `1px solid ${border}`,
                    overflow: 'hidden', width: '100%', maxWidth: 400, margin: '0 auto',
                    fontFamily: '-apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif', color: text
                }}>
                    {view === 'profile' ? (
                        <>
                            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', padding: '14px 16px', borderBottom: `1px solid ${border}`, position: 'relative' }}>
                                <span style={{ fontWeight: 700, fontSize: 16 }}>{instaProfile.username}</span>
                                <ChevronDown size={16} style={{ position: 'absolute', right: 16 }} />
                            </div>
                            <div style={{ padding: '16px 16px 8px' }}>
                                <div style={{ display: 'flex', alignItems: 'center', gap: 20, marginBottom: 14 }}>
                                    <div style={{ width: 80, height: 80, borderRadius: '50%', padding: 2, background: 'linear-gradient(45deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888)', flexShrink: 0 }}>
                                        <div style={{ width: '100%', height: '100%', borderRadius: '50%', background: bg, padding: 2, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                                            <img src={post.avatar} alt="" style={{ width: '100%', height: '100%', borderRadius: '50%', objectFit: 'contain' }} />
                                        </div>
                                    </div>
                                    <div style={{ display: 'flex', gap: 24, flex: 1 }}>
                                        {[['74','posts'],['295','seguidores'],['88','seguindo']].map(([n,l]) => (
                                            <div key={l} style={{ textAlign: 'center', flex: 1 }}>
                                                <div style={{ fontWeight: 700, fontSize: 16 }}>{n}</div>
                                                <div style={{ fontSize: 12, color: muted }}>{l}</div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                                <div style={{ marginBottom: 12 }}>
                                    <p style={{ fontWeight: 700, fontSize: 13, margin: '0 0 2px' }}>{instaProfile.name}</p>
                                    <p style={{ fontSize: 12, color: muted, margin: '0 0 4px' }}>{instaProfile.category}</p>
                                    <p style={{ fontSize: 13, margin: '0 0 4px', lineHeight: 1.4 }}>{instaProfile.bio.join('\n')}</p>
                                    <a href="#" style={{ fontSize: 13, color: '#00376B', fontWeight: 600, textDecoration: 'none', display: 'flex', alignItems: 'center', gap: 4 }}>
                                        <LinkIcon size={12} />{instaProfile.link}
                                    </a>
                                </div>
                                <div style={{ display: 'flex', gap: 6, marginBottom: 14 }}>
                                    {['Seguindo','Mensagem','Contato'].map(b => (
                                        <button key={b} style={{ flex: 1, padding: '6px 0', borderRadius: 8, border: `1px solid ${border}`, background: surface, color: text, fontSize: 13, fontWeight: 600, cursor: 'pointer' }}>{b}</button>
                                    ))}
                                </div>
                            </div>
                            <div style={{ display: 'flex', borderTop: `1px solid ${border}`, borderBottom: `1px solid ${border}` }}>
                                <div style={{ flex: 1, display: 'flex', justifyContent: 'center', padding: '12px 0', borderBottom: `2px solid ${text}` }}><Grid size={22} /></div>
                                <div style={{ flex: 1, display: 'flex', justifyContent: 'center', padding: '12px 0', color: muted }}><PlaySquare size={22} /></div>
                                <div style={{ flex: 1, display: 'flex', justifyContent: 'center', padding: '12px 0', color: muted }}><UserSquare size={22} /></div>
                            </div>
                            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3,1fr)', gap: 2 }}>
                                <div onClick={() => setView('post')} style={{ aspectRatio: '4/5', cursor: 'pointer', position: 'relative', overflow: 'hidden' }}>
                                    <img src={post.imageUrl} alt="" style={{ width: '100%', height: '100%', objectFit: 'cover' }} />
                                    <div style={{ position: 'absolute', inset: 0, background: 'rgba(0,0,0,0)', display: 'flex', alignItems: 'center', justifyContent: 'center', transition: 'background .2s' }}
                                        onMouseEnter={e => e.currentTarget.style.background = 'rgba(0,0,0,0.35)'}
                                        onMouseLeave={e => e.currentTarget.style.background = 'rgba(0,0,0,0)'}
                                    >
                                        <Eye size={22} color="#fff" style={{ opacity: 0.9 }} />
                                    </div>
                                </div>
                                {[1,2].map(i => <div key={i} style={{ aspectRatio: '4/5', background: surface }} />)}
                            </div>
                        </>
                    ) : (
                        <>
                            <div style={{ display: 'flex', alignItems: 'center', padding: '12px 16px', borderBottom: `1px solid ${border}` }}>
                                <button onClick={() => setView('profile')} style={{ background: 'none', border: 'none', cursor: 'pointer', color: text, padding: '4px 8px 4px 0', display: 'flex' }}>
                                    <ChevronLeft size={22} />
                                </button>
                                <span style={{ fontWeight: 700, fontSize: 15, flex: 1, textAlign: 'center', marginRight: 30 }}>Publicações</span>
                            </div>
                            <div style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '10px 14px' }}>
                                <img src={post.avatar} alt="" style={{ width: 32, height: 32, borderRadius: '50%', objectFit: 'contain', border: `1px solid ${border}` }} />
                                <span style={{ fontWeight: 700, fontSize: 13 }}>{instaProfile.username}</span>
                                <MoreHorizontal size={16} style={{ marginLeft: 'auto', color: muted }} />
                            </div>
                            <div style={{ background: '#000', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                                <img src={post.imageUrl} onError={e => handleImgErr(e, post.fallbackUrl)} alt="" style={{ width: '100%', objectFit: 'contain', maxHeight: 420 }} />
                            </div>
                            <div style={{ padding: '10px 14px' }}>
                                <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 8 }}>
                                    <div style={{ display: 'flex', gap: 16 }}>
                                        <Heart size={24} style={{ cursor: 'pointer' }} />
                                        <MessageCircle size={24} style={{ cursor: 'pointer' }} />
                                        <Send size={24} style={{ cursor: 'pointer' }} />
                                    </div>
                                    <Bookmark size={24} style={{ cursor: 'pointer' }} />
                                </div>
                                <p style={{ fontWeight: 700, fontSize: 13, margin: '0 0 4px' }}>34 curtidas</p>
                                <p style={{ fontSize: 13, margin: 0, lineHeight: 1.5, whiteSpace: 'pre-wrap' }}>
                                    <strong>{instaProfile.username} </strong>{post.caption}
                                </p>
                                <p style={{ fontSize: 11, color: muted, marginTop: 6, textTransform: 'uppercase', letterSpacing: '0.05em' }}>Aguardando aprovação</p>
                            </div>
                        </>
                    )}
                </div>
            );
        };

        const LinkedinMockup = ({ post, isDark }) => {
            const bg = isDark ? '#1D2226' : '#fff';
            const border = isDark ? '#38434F' : '#E0DFDC';
            const text = isDark ? '#fff' : '#000';
            const muted = isDark ? '#8B9197' : '#666';

            return (
                <div style={{
                    background: bg, border: `1px solid ${border}`, borderRadius: 12,
                    overflow: 'hidden', width: '100%', maxWidth: 500, margin: '0 auto',
                    fontFamily: '-apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif', color: text
                }}>
                    <div style={{ padding: '14px 16px 8px', display: 'flex', alignItems: 'flex-start', gap: 12 }}>
                        <img src={post.avatar} alt="" style={{ width: 48, height: 48, borderRadius: '50%', objectFit: 'contain', border: `1px solid ${border}`, flexShrink: 0 }} />
                        <div>
                            <p style={{ fontWeight: 600, fontSize: 14, margin: '0 0 2px', color: isDark ? '#70B5F9' : '#0073B1', cursor: 'pointer' }}>{post.author}</p>
                            <p style={{ fontSize: 12, color: muted, margin: '0 0 1px' }}>{post.role}</p>
                            <p style={{ fontSize: 11, color: muted, margin: 0, display: 'flex', alignItems: 'center', gap: 4 }}>
                                Rascunho · <Globe size={11} />
                            </p>
                        </div>
                        <MoreHorizontal size={18} style={{ marginLeft: 'auto', color: muted, cursor: 'pointer' }} />
                    </div>
                    <p style={{ fontSize: 13, padding: '0 16px 12px', margin: 0, lineHeight: 1.55, whiteSpace: 'pre-wrap' }}>{post.caption}</p>
                    <div style={{ borderTop: `1px solid ${border}`, borderBottom: `1px solid ${border}` }}>
                        <img src={post.imageUrl} onError={e => handleImgErr(e, post.fallbackUrl)} alt="" style={{ width: '100%', objectFit: 'contain', maxHeight: 400, background: isDark ? '#000' : '#F3F2EF', display: 'block' }} />
                    </div>
                    <div style={{ display: 'flex', padding: '2px 8px' }}>
                        {[['Gostei', ThumbsUp], ['Comentar', MessageCircle], ['Enviar', Send]].map(([label, Icon]) => (
                            <button key={label} style={{
                                flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 6,
                                padding: '11px 4px', background: 'none', border: 'none', cursor: 'pointer',
                                color: muted, fontSize: 13, fontWeight: 600, borderRadius: 8
                            }}>
                                <Icon size={18} />{label}
                            </button>
                        ))}
                    </div>
                </div>
            );
        };

        const PostItem = ({ post, isDark, user }) => {
            const [tab, setTab] = useState('instagram');
            const { copied, copy } = useCopyToast();
            const [expanded, setExpanded] = useState(false);

            const border = isDark ? 'rgba(255,255,255,0.07)' : '#E2E8F0';
            const surface = isDark ? 'rgba(255,255,255,0.03)' : '#F8FAFC';
            const textPrimary = isDark ? '#F1F5F9' : '#0F172A';
            const textSecondary = isDark ? '#94A3B8' : '#64748B';

            const previewText = post.caption.slice(0, 120) + (post.caption.length > 120 ? '…' : '');

            return (
                <article style={{
                    borderRadius: 20, border: `1px solid ${border}`,
                    overflow: 'hidden', marginBottom: 40,
                    background: isDark ? '#151F2E' : '#fff',
                    boxShadow: isDark ? '0 4px 40px rgba(0,0,0,0.4)' : '0 4px 32px rgba(15,23,42,0.06)',
                    transition: 'box-shadow .2s'
                }}>
                    <div style={{
                        display: 'flex', flexWrap: 'wrap', gap: 12, alignItems: 'center', justifyContent: 'space-between',
                        padding: '20px 24px', borderBottom: `1px solid ${border}`
                    }}>
                        <div style={{ display: 'flex', alignItems: 'center', gap: 14 }}>
                            <div style={{
                                width: 42, height: 42, borderRadius: 12, overflow: 'hidden', flexShrink: 0,
                                background: surface, border: `1px solid ${border}`, display: 'flex', alignItems: 'center', justifyContent: 'center'
                            }}>
                                <img src={post.avatar} alt="" style={{ width: '100%', height: '100%', objectFit: 'contain' }} />
                            </div>
                            <div>
                                <p style={{ fontWeight: 700, fontSize: 15, color: textPrimary, margin: 0 }}>{post.title}</p>
                                <p style={{ fontSize: 12, color: textSecondary, margin: '2px 0 0', display: 'flex', alignItems: 'center', gap: 6 }}>
                                    <Clock size={12} />{post.date} · {post.platform}
                                </p>
                            </div>
                        </div>
                        <StatusBadge status={post.status} label={post.statusLabel} isDark={isDark} />
                    </div>

                    <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(300px, 1fr))' }}>
                        <div style={{ background: isDark ? '#0D1520' : '#F1F5F9', borderRight: `1px solid ${border}` }}>
                            <div style={{ display: 'flex', borderBottom: `1px solid ${border}`, background: isDark ? '#151F2E' : '#fff' }}>
                                {[['instagram', Instagram, 'Instagram'], ['linkedin', Linkedin, 'LinkedIn']].map(([id, Icon, label]) => (
                                    <button key={id} onClick={() => setTab(id)} style={{
                                        flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 7,
                                        padding: '14px 0', background: 'none', border: 'none', cursor: 'pointer',
                                        fontWeight: 700, fontSize: 13, transition: 'all .15s',
                                        borderBottom: tab === id ? `2px solid ${isDark ? '#55BBDF' : '#00524D'}` : '2px solid transparent',
                                        color: tab === id ? (isDark ? '#55BBDF' : '#00524D') : textSecondary
                                    }}>
                                        <Icon size={15} />{label}
                                    </button>
                                ))}
                            </div>
                            <div style={{ padding: '24px 16px', display: 'flex', justifyContent: 'center', minHeight: 500, overflowY: 'auto' }}>
                                {tab === 'instagram' ? <InstagramMockup post={post} isDark={isDark} /> : <LinkedinMockup post={post} isDark={isDark} />}
                            </div>
                        </div>

                        <div style={{ display: 'flex', flexDirection: 'column' }}>
                            <div style={{ flex: 1, padding: '28px 28px 0' }}>
                                <div style={{ marginBottom: 28 }}>
                                    <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 14 }}>
                                        <p style={{ fontSize: 11, fontWeight: 700, letterSpacing: '0.08em', textTransform: 'uppercase', color: isDark ? '#55BBDF' : '#00524D', margin: 0 }}>
                                            Texto de Publicação
                                        </p>
                                        <button onClick={() => copy(post.caption)} style={{
                                            display: 'flex', alignItems: 'center', gap: 5, padding: '5px 12px',
                                            background: surface, border: `1px solid ${border}`, borderRadius: 8,
                                            cursor: 'pointer', fontSize: 12, fontWeight: 600, color: textSecondary,
                                            transition: 'all .15s'
                                        }}>
                                            {copied ? <Check size={13} style={{ color: '#10B981' }} /> : <Copy size={13} />}
                                            {copied ? 'Copiado!' : 'Copiar'}
                                        </button>
                                    </div>
                                    <div style={{
                                        background: surface, border: `1px solid ${border}`, borderRadius: 14,
                                        padding: '18px 20px', fontSize: 13, lineHeight: 1.7, color: textPrimary,
                                        whiteSpace: 'pre-wrap', position: 'relative'
                                    }}>
                                        {expanded ? post.caption : previewText}
                                        {post.caption.length > 120 && (
                                            <button onClick={() => setExpanded(!expanded)} style={{
                                                background: 'none', border: 'none', cursor: 'pointer',
                                                color: isDark ? '#55BBDF' : '#00524D', fontSize: 13, fontWeight: 700, padding: '2px 0', display: 'block', marginTop: 4
                                            }}>
                                                {expanded ? 'Ver menos ↑' : 'Ver completo ↓'}
                                            </button>
                                        )}
                                    </div>
                                </div>

                                <div style={{ marginBottom: 28 }}>
                                    <p style={{ fontSize: 11, fontWeight: 700, letterSpacing: '0.08em', textTransform: 'uppercase', color: isDark ? '#FCD34D' : '#92400E', margin: '0 0 14px', display: 'flex', alignItems: 'center', gap: 7 }}>
                                        <Lightbulb size={13} /> Nota Estratégica
                                    </p>
                                    <div style={{
                                        borderRadius: 14, padding: '18px 20px',
                                        background: isDark ? 'rgba(251,191,36,0.06)' : '#FFFBEB',
                                        border: `1px solid ${isDark ? 'rgba(251,191,36,0.15)' : '#FDE68A'}`,
                                        position: 'relative', paddingLeft: 24
                                    }}>
                                        <div style={{
                                            position: 'absolute', left: 0, top: 0, bottom: 0, width: 4,
                                            borderRadius: '14px 0 0 14px',
                                            background: isDark ? '#FCD34D' : '#F59E0B'
                                        }} />
                                        <p style={{ fontSize: 13, lineHeight: 1.7, color: isDark ? '#FEF3C7' : '#78350F', margin: 0, whiteSpace: 'pre-wrap' }}>
                                            {post.marketingNote}
                                        </p>
                                    </div>
                                </div>
                            </div>

                            <div style={{ padding: '20px 28px 28px', borderTop: `1px solid ${border}`, background: isDark ? 'rgba(255,255,255,0.02)' : '#FAFAFA' }}>
                                <button
                                    onClick={() => handleDownload(post.imageUrl, post.fallbackUrl, `${post.title}.jpg`)}
                                    style={{
                                        width: '100%', display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 10,
                                        padding: '14px 24px', borderRadius: 14, border: 'none', cursor: 'pointer',
                                        background: isDark ? '#55BBDF' : '#153D56',
                                        color: isDark ? '#0F172A' : '#fff',
                                        fontSize: 15, fontWeight: 700, transition: 'opacity .15s',
                                        letterSpacing: '-0.01em'
                                    }}
                                    onMouseEnter={e => e.currentTarget.style.opacity = '0.88'}
                                    onMouseLeave={e => e.currentTarget.style.opacity = '1'}
                                >
                                    <Download size={18} />
                                    Baixar Imagem Base
                                </button>
                                <p style={{ textAlign: 'center', fontSize: 12, color: textSecondary, margin: '10px 0 0' }}>
                                    Arquivo para edição final do post
                                </p>
                            </div>
                        </div>
                    </div>

                    <PostFeedback postId={post.id} isDark={isDark} user={user} />
                </article>
            );
        };

        function App() {
            const [isDark, setIsDark] = useState(false);
            const [user, setUser] = useState(null);

            useEffect(() => {
                const init = async () => {
                    try {
                        if (auth) {
                            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                                await signInWithCustomToken(auth, __initial_auth_token);
                            } else {
                                await signInAnonymously(auth);
                            }
                        }
                    } catch (e) { console.error(e); }
                };
                init();
                if(auth) {
                    return onAuthStateChanged(auth, setUser);
                }
            }, []);

            const loginGoogle = async () => {
                if(!auth) return alert("Firebase não configurado.");
                try { await signInWithPopup(auth, new GoogleAuthProvider()); }
                catch { alert('Não foi possível abrir o popup do Google.'); }
            };

            const logout = async () => {
                if(!auth) return;
                await signOut(auth);
                await signInAnonymously(auth);
            };

            const bg = isDark ? '#0D1520' : '#F0F4F8';
            const headerBg = isDark ? 'rgba(21,31,46,0.95)' : 'rgba(255,255,255,0.95)';
            const border = isDark ? 'rgba(255,255,255,0.07)' : '#E2E8F0';
            const textPrimary = isDark ? '#F1F5F9' : '#0F172A';
            const textSecondary = isDark ? '#94A3B8' : '#64748B';

            const isGoogle = user && !user.isAnonymous;

            return (
                <div style={{ minHeight: '100vh', background: bg, fontFamily: '-apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif', transition: 'background .3s' }}>
                    <header style={{
                        position: 'sticky', top: 0, zIndex: 50,
                        background: headerBg,
                        backdropFilter: 'blur(16px)', WebkitBackdropFilter: 'blur(16px)',
                        borderBottom: `1px solid ${border}`,
                        padding: '0 20px'
                    }}>
                        <div style={{ maxWidth: 1100, margin: '0 auto', display: 'flex', alignItems: 'center', justifyContent: 'space-between', height: 64, gap: 16 }}>
                            <div style={{ display: 'flex', alignItems: 'center', gap: 14 }}>
                                <img src={logoUrl} alt="Hidrogest" style={{
                                    height: 40, objectFit: 'contain',
                                    filter: isDark ? 'brightness(0) invert(1)' : 'none',
                                    opacity: isDark ? 0.9 : 1
                                }} />
                                <div style={{ borderLeft: `1px solid ${border}`, paddingLeft: 14 }}>
                                    <p style={{ fontWeight: 800, fontSize: 14, color: textPrimary, margin: 0, lineHeight: 1.2 }}>Sistema de Aprovação</p>
                                    <p style={{ fontSize: 11, color: textSecondary, margin: 0 }}>Copywriting & Conteúdo</p>
                                </div>
                            </div>

                            <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                                <div style={{
                                    display: 'flex', alignItems: 'center', gap: 6, padding: '5px 12px',
                                    background: isDark ? 'rgba(251,191,36,0.1)' : '#FEFCE8',
                                    border: `1px solid ${isDark ? 'rgba(251,191,36,0.2)' : '#FDE68A'}`,
                                    borderRadius: 999, fontSize: 12, fontWeight: 700,
                                    color: isDark ? '#FCD34D' : '#92400E'
                                }}>
                                    <AlertCircle size={12} />
                                    {portfolioData.length} pendente{portfolioData.length !== 1 ? 's' : ''}
                                </div>

                                {isGoogle ? (
                                    <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                                        <img src={user.photoURL} alt="" style={{ width: 32, height: 32, borderRadius: '50%' }} />
                                        <span style={{ fontSize: 13, fontWeight: 600, color: textPrimary, display: 'none' }} className="md-show">
                                            {user.displayName?.split(' ')[0]}
                                        </span>
                                        <button onClick={logout} style={{
                                            background: 'none', border: 'none', cursor: 'pointer',
                                            color: textSecondary, display: 'flex', alignItems: 'center', padding: 4
                                        }} title="Sair">
                                            <LogOut size={15} />
                                        </button>
                                    </div>
                                ) : (
                                    <button onClick={loginGoogle} style={{
                                        display: 'flex', alignItems: 'center', gap: 8,
                                        background: isDark ? 'rgba(255,255,255,0.08)' : '#fff',
                                        border: `1px solid ${border}`, borderRadius: 10,
                                        padding: '7px 14px', cursor: 'pointer',
                                        fontSize: 13, fontWeight: 700, color: textPrimary
                                    }}>
                                        <img src="https://www.svgrepo.com/show/475656/google-color.svg" alt="" style={{ width: 16, height: 16 }} />
                                        Entrar
                                    </button>
                                )}

                                <button onClick={() => setIsDark(!isDark)} style={{
                                    width: 36, height: 36, borderRadius: 10, border: `1px solid ${border}`,
                                    background: isDark ? 'rgba(255,255,255,0.06)' : '#F1F5F9',
                                    cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center',
                                    color: isDark ? '#FCD34D' : '#64748B', transition: 'all .15s'
                                }}>
                                    {isDark ? <Sun size={16} /> : <Moon size={16} />}
                                </button>
                            </div>
                        </div>
                    </header>

                    <main style={{ maxWidth: 1100, margin: '0 auto', padding: '36px 16px 60px' }}>
                        <div style={{ marginBottom: 32 }}>
                            <div style={{ display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between', gap: 16, flexWrap: 'wrap' }}>
                                <div>
                                    <h1 style={{ fontSize: 26, fontWeight: 800, color: textPrimary, margin: '0 0 6px', letterSpacing: '-0.02em' }}>
                                        Publicações para Revisão
                                    </h1>
                                    <p style={{ fontSize: 14, color: textSecondary, margin: 0 }}>
                                        Analise os mockups, leia a nota estratégica e sinalize sua aprovação ou pedido de ajuste.
                                    </p>
                                </div>
                                <div style={{ display: 'flex', gap: 10 }}>
                                    {[['Pendentes', portfolioData.filter(p => p.status === 'pending').length, '#F59E0B'],
                                      ['Total', portfolioData.length, isDark ? '#55BBDF' : '#153D56']
                                    ].map(([label, count, color]) => (
                                        <div key={label} style={{
                                            padding: '10px 18px', borderRadius: 12,
                                            background: isDark ? 'rgba(255,255,255,0.04)' : '#fff',
                                            border: `1px solid ${border}`, textAlign: 'center', minWidth: 80
                                        }}>
                                            <p style={{ fontSize: 22, fontWeight: 800, color, margin: 0 }}>{count}</p>
                                            <p style={{ fontSize: 11, color: textSecondary, margin: 0 }}>{label}</p>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>

                        {portfolioData.map(post => (
                            <PostItem key={post.id} post={post} isDark={isDark} user={user} />
                        ))}

                        <footer style={{ textAlign: 'center', fontSize: 12, color: isDark ? '#475569' : '#94A3B8', paddingTop: 12 }}>
                            Sistema de Produção e Aprovação de Conteúdo · Desenvolvido para Felipe Canelli
                        </footer>
                    </main>
                </div>
            );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
