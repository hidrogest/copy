<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Aprovação - Hidrogest</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            lightBlue: '#55BBDF',
                            darkBlue: '#153D56',
                            darkGreen: '#00524D',
                            mediumGreen: '#659368',
                            lightGreen: '#CFDDBA',
                        },
                        darkBg: '#0D1520',
                        darkCard: '#151F2E',
                        darkBorder: 'rgba(255,255,255,0.07)'
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Babel standalone para transpilar React no navegador -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="m-0 p-0 antialiased selection:bg-brand-lightBlue selection:text-white">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect } from 'https://esm.sh/react@18.2.0';
        import { createRoot } from 'https://esm.sh/react-dom@18.2.0/client';
        
        import { 
            Download, Instagram, Linkedin, Heart, MessageCircle, Send, Bookmark, 
            ThumbsUp, Lightbulb, MoreHorizontal, Globe, Moon, Sun, 
            Grid, PlaySquare, UserSquare, Link as LinkIcon, Mail, Phone, 
            MessageSquare, CheckCircle2, ChevronLeft, LogOut, ChevronDown, 
            Clock, AlertCircle, Eye, X 
        } from 'https://esm.sh/lucide-react@0.292.0';

        // --- INTEGRAÇÃO COM FIREBASE ---
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { 
            getAuth, onAuthStateChanged, signInWithCustomToken, signInAnonymously, 
            GoogleAuthProvider, signInWithPopup, signOut 
        } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { 
            getFirestore, collection, addDoc, onSnapshot, serverTimestamp 
        } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "SUA_API_KEY_AQUI",
            authDomain: "seu-projeto.firebaseapp.com",
            projectId: "seu-projeto",
            storageBucket: "seu-projeto.appspot.com",
            messagingSenderId: "SEU_MESSAGING_ID",
            appId: "SEU_APP_ID"
        };

        let app, auth, db;
        try {
            app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            db = getFirestore(app);
        } catch(e) {
            console.warn("Aviso: Configuração do Firebase incompleta ou incorreta.", e);
        }

        const appId = 'sistema-aprovacao';

        const logoUrl = "https://drive.google.com/thumbnail?id=1N19BuQD2EAwpsGJBu85561u67orNR92h&sz=w1000";

        const instaProfile = {
            username: "hidrogest_engenharia",
            name: "Hidrogest Engenharia e Consultoria",
            posts: 75,
            followers: 295,
            following: 88,
            category: "Produto/serviço",
            bio: ["• Batimetria", "• Hidrometria", "• Monitoramento e qualidade de água", "• Operação e Manut. de equipamento... mais"],
            address: "Rua Contria, 769, Alto Barroca., Belo Horizonte",
            link: "linktr.ee/hidrogest"
        };

        const portfolioData = [
            {
                id: 2,
                title: "Tecnologia e Inteligência de Dados",
                platform: "Instagram + LinkedIn",
                status: "pending",
                statusLabel: "Aguardando Avaliação",
                author: "Hidrogest Engenharia",
                role: "Engenharia e Meio Ambiente",
                avatar: "https://drive.google.com/thumbnail?id=1N19BuQD2EAwpsGJBu85561u67orNR92h&sz=w200",
                caption: {
                    linkedin: `Decisões corporativas de alto nível não podem ser tomadas no escuro — especialmente quando envolvem o uso ou o desvio de recursos hídricos. Na Hidrogest, unimos hidrografia de precisão com modelagem de dados avançada. Mapeamos desde a capacidade volumétrica de grandes reservatórios industriais até a dinâmica de fluxo de rios em áreas de mineração. Tecnologia de ponta a serviço da engenharia da sua empresa.\n\n#Inovação #Hidrografia #Tecnologia #Mineração #EngenhariaAmbiental`,
                    instagram: `Precisão milimétrica para decisões milionárias. A tecnologia hidrográfica da Hidrogest revela o comportamento dinâmico da água, entregando inteligência de dados para operações complexas em mineração, agro e indústrias. Conheça nossas soluções corporativas.\n\n#Inovação #Hidrografia #Tecnologia #Mineração #EngenhariaAmbiental`
                },
                marketingNote: `Sugiro priorizarmos a expressão "Dinâmica Invisível" na abertura da copy do Instagram e no primeiro parágrafo do LinkedIn.\n\nEm mercados de alta complexidade como mineração e grandes indústrias, o maior medo de um gestor é o risco não mapeado. Ao utilizarmos o conceito de "dinâmica invisível", criamos um gatilho mental de curiosidade e urgência: o cliente percebe que o que ele vê na superfície da água não é suficiente para garantir a segurança operacional ou o cumprimento de metas de ESG.\n\nEssa abordagem permite que a Hidrogest se posicione não apenas como uma empresa de medição, mas como a detentora da tecnologia que "revela" o que está oculto sob a lâmina d'água, justificando o investimento em modelagem de dados avançada para mitigar riscos financeiros e ambientais.`,
                imageUrl: "https://drive.google.com/thumbnail?id=1MHrUwBvPVE4GCiQLCk3U2rTQxGOInx-e&sz=w1000",
                fallbackUrl: "https://images.unsplash.com/photo-1581092580497-e0d23cbdf1dc?q=80&w=1080&auto=format&fit=crop",
                date: "20 Mai 2026"
            },
            {
                id: 1,
                title: "Bacia Hidrográfica",
                platform: "Instagram + LinkedIn",
                status: "pending",
                statusLabel: "Aguardando Avaliação",
                author: "Hidrogest Engenharia",
                role: "Engenharia e Meio Ambiente",
                avatar: "https://drive.google.com/thumbnail?id=1N19BuQD2EAwpsGJBu85561u67orNR92h&sz=w200",
                caption: `Imagine um grande funil esculpido pelo próprio relevo: essa é a dinâmica de uma bacia hidrográfica! 💧\n\nA topografia do terreno atua como um sistema de captação. Toda a água da chuva que cai nessa área converge pelas encostas até um único ponto de saída, formando o nosso rio principal. É exatamente esse "efeito funil" que dita o equilíbrio dos nossos ecossistemas e garante o abastecimento de água.\n\nVocê sabe a qual bacia hidrográfica o seu município pertence? Conta aqui para mim! 👇\n\n#GeografiaFisica #RecursosHidricos #BaciasHidrograficas #GestaoAmbiental`,
                marketingNote: `Sugiro mantermos o termo "funil" na copy por uma questão estratégica de retenção.\n\nEm vídeos curtos, precisamos de um gancho visual imediato, e a palavra "funil" traduz a complexidade topográfica em uma imagem mental instantânea que qualquer pessoa compreende. Isso prende a atenção, facilita a inserção de elementos gráficos na edição e tangibiliza a dinâmica do relevo de forma didática.\n\nA ideia é usar essa analogia como isca inicial e, na sequência, entregar o conceito técnico correto.`,
                imageUrl: "https://drive.google.com/thumbnail?id=1TqkLo_V7HcWS_nBu0Z9Kk6NwSarl7PJw&sz=w1000", // <-- IMAGEM ATUALIZADA AQUI
                fallbackUrl: "https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?q=80&w=1080&auto=format&fit=crop",
                date: "15 Mai 2026"
            }
        ];

        const handleDownload = async (url, fallbackUrl, filename) => {
            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error();
                const blob = await response.blob();
                const blobUrl = window.URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = blobUrl; link.download = filename || 'post.jpg';
                document.body.appendChild(link); link.click();
                document.body.removeChild(link); window.URL.revokeObjectURL(blobUrl);
            } catch { window.open(url, '_blank'); }
        };

        const handleImgErr = (e, fallback) => { e.target.src = fallback; };

        const StatusBadge = ({ status, label }) => {
            const styles = {
                pending: "bg-amber-100 text-amber-800 border-amber-200 dark:bg-amber-400/10 dark:text-amber-400 dark:border-amber-400/20",
                approved: "bg-emerald-100 text-emerald-800 border-emerald-200 dark:bg-emerald-400/10 dark:text-emerald-400 dark:border-emerald-400/20",
                rejected: "bg-rose-100 text-rose-800 border-rose-200 dark:bg-rose-400/10 dark:text-rose-400 dark:border-rose-400/20",
            };
            const dots = {
                pending: "bg-amber-500", approved: "bg-emerald-500", rejected: "bg-rose-500"
            };
            
            const currentStyle = styles[status] || styles.pending;
            const currentDot = dots[status] || dots.pending;

            return (
                <span className={`inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-semibold border whitespace-nowrap ${currentStyle}`}>
                    <span className={`w-1.5 h-1.5 rounded-full shrink-0 ${currentDot}`}></span>
                    {label}
                </span>
            );
        };

        const InstagramMockup = ({ post }) => {
            const [view, setView] = useState('profile');
            const [activePost, setActivePost] = useState(post);

            // Garante que se o card trocar, a visualização reseta
            useEffect(() => {
                setActivePost(post);
            }, [post]);

            const captionText = typeof activePost.caption === 'string' ? activePost.caption : activePost.caption.instagram;

            return (
                <div className="bg-white dark:bg-black rounded-2xl border border-slate-300 dark:border-slate-800 overflow-hidden w-full max-w-[400px] mx-auto text-slate-900 dark:text-white transition-colors shadow-sm">
                    {view === 'profile' ? (
                        <div className="animate-in fade-in duration-300">
                            {/* Insta Header */}
                            <div className="flex items-center justify-center p-3.5 border-b border-slate-200 dark:border-slate-800 relative">
                                <span className="font-bold text-base">{instaProfile.username}</span>
                                <ChevronDown className="w-4 h-4 absolute right-4" />
                            </div>
                            
                            {/* Profile Info */}
                            <div className="p-4 pb-2">
                                <div className="flex items-center gap-5 mb-3.5">
                                    <div className="w-20 h-20 rounded-full p-0.5 bg-gradient-to-tr from-yellow-400 to-fuchsia-600 shrink-0">
                                        <div className="w-full h-full rounded-full bg-white dark:bg-black p-0.5 flex items-center justify-center">
                                            <img src={post.avatar} className="w-full h-full rounded-full object-contain" alt="Avatar" />
                                        </div>
                                    </div>
                                    <div className="flex gap-4 flex-1 justify-around text-center">
                                        <div className="flex flex-col"><span className="font-bold text-base">{instaProfile.posts}</span><span className="text-xs text-slate-500 dark:text-slate-400">posts</span></div>
                                        <div className="flex flex-col"><span className="font-bold text-base">{instaProfile.followers}</span><span className="text-xs text-slate-500 dark:text-slate-400">seguidores</span></div>
                                        <div className="flex flex-col"><span className="font-bold text-base">{instaProfile.following}</span><span className="text-xs text-slate-500 dark:text-slate-400">seguindo</span></div>
                                    </div>
                                </div>
                                <div className="mb-3 text-sm">
                                    <p className="font-bold mb-0.5">{instaProfile.name}</p>
                                    <p className="text-xs text-slate-500 dark:text-slate-400 mb-1">{instaProfile.category}</p>
                                    <p className="mb-1 leading-snug whitespace-pre-wrap">{instaProfile.bio.join('\n')}</p>
                                    <a href="#" className="font-semibold text-blue-900 dark:text-blue-300 flex items-center gap-1"><LinkIcon className="w-3 h-3" />{instaProfile.link}</a>
                                </div>
                                <div className="flex gap-2 mb-3">
                                    {['Seguindo', 'Mensagem', 'Contato'].map(btn => (
                                        <button key={btn} className="flex-1 py-1.5 rounded-lg bg-slate-100 dark:bg-[#1C1C1E] border border-slate-200 dark:border-slate-800 text-sm font-semibold">{btn}</button>
                                    ))}
                                </div>
                            </div>

                            {/* Grid Tabs */}
                            <div className="flex border-t border-slate-200 dark:border-slate-800 text-slate-400">
                                <div className="flex-1 flex justify-center py-3 border-b-2 border-slate-900 dark:border-white text-slate-900 dark:text-white"><Grid className="w-5 h-5" /></div>
                                <div className="flex-1 flex justify-center py-3"><PlaySquare className="w-5 h-5" /></div>
                                <div className="flex-1 flex justify-center py-3"><UserSquare className="w-5 h-5" /></div>
                            </div>

                            {/* Grid Posts */}
                            <div className="grid grid-cols-3 gap-0.5">
                                {portfolioData.map((p) => (
                                    <div key={p.id} onClick={() => { setActivePost(p); setView('post'); }} className="aspect-[4/5] relative cursor-pointer group bg-slate-100 dark:bg-slate-900 overflow-hidden">
                                        <img src={p.imageUrl} className="w-full h-full object-cover" alt="Post thumbnail" />
                                        <div className="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center">
                                            <Eye className="w-6 h-6 text-white opacity-90" />
                                        </div>
                                        {/* Indicador do post atual do card */}
                                        {p.id === post.id && (
                                            <div className="absolute top-2 right-2 w-3 h-3 rounded-full bg-brand-lightBlue border-2 border-white dark:border-black shadow-sm" title="Post referente a este card"></div>
                                        )}
                                    </div>
                                ))}
                                {/* Preenchimento da grade com blocos vazios para manter o layout visual do Instagram */}
                                {Array.from({ length: Math.max(0, 9 - portfolioData.length) }).map((_, i) => (
                                    <div key={`empty-${i}`} className="aspect-[4/5] bg-slate-100 dark:bg-[#1C1C1E]"></div>
                                ))}
                            </div>
                        </div>
                    ) : (
                        <div className="flex flex-col h-full animate-in slide-in-from-right-4 duration-300">
                            {/* Single Post View */}
                            <div className="flex items-center p-3 border-b border-slate-200 dark:border-slate-800">
                                <button onClick={() => { setView('profile'); setActivePost(post); }} className="p-1 -ml-1 text-slate-900 dark:text-white">
                                    <ChevronLeft className="w-6 h-6" />
                                </button>
                                <span className="font-bold text-[15px] flex-1 text-center mr-6">Publicações</span>
                            </div>
                            
                            <div className="flex items-center gap-2.5 px-3.5 py-2.5">
                                <img src={activePost.avatar} className="w-8 h-8 rounded-full object-contain border border-slate-200 dark:border-slate-700" alt="Avatar" />
                                <span className="font-bold text-[13px]">{instaProfile.username}</span>
                                <MoreHorizontal className="w-4 h-4 ml-auto text-slate-500" />
                            </div>

                            <div className="bg-black flex items-center justify-center border-y border-slate-200 dark:border-slate-800">
                                <img src={activePost.imageUrl} onError={(e) => handleImgErr(e, activePost.fallbackUrl)} className="w-full object-contain max-h-[420px]" alt="Post" />
                            </div>

                            <div className="p-3.5 pb-6">
                                <div className="flex justify-between mb-2">
                                    <div className="flex gap-4">
                                        <Heart className="w-6 h-6 cursor-pointer hover:text-slate-500 transition-colors" />
                                        <MessageCircle className="w-6 h-6 cursor-pointer hover:text-slate-500 transition-colors" />
                                        <Send className="w-6 h-6 cursor-pointer hover:text-slate-500 transition-colors" />
                                    </div>
                                    <Bookmark className="w-6 h-6 cursor-pointer hover:text-slate-500 transition-colors" />
                                </div>
                                <p className="font-bold text-[13px] mb-1">34 curtidas</p>
                                <p className="text-[13px] leading-relaxed whitespace-pre-wrap">
                                    <strong className="mr-1.5">{instaProfile.username}</strong>{captionText}
                                </p>
                                <p className="text-[11px] text-slate-500 mt-2 uppercase tracking-wider">Aguardando aprovação</p>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const LinkedinMockup = ({ post }) => {
            const captionText = typeof post.caption === 'string' ? post.caption : post.caption.linkedin;

            return (
                <div className="bg-white dark:bg-[#1D2226] border border-slate-300 dark:border-[#38434F] rounded-xl overflow-hidden w-full max-w-[500px] mx-auto text-slate-900 dark:text-white transition-colors shadow-sm">
                    <div className="p-4 pb-2 flex items-start gap-3">
                        <img src={post.avatar} className="w-12 h-12 rounded-full object-contain border border-slate-200 dark:border-slate-700 shrink-0" alt="Avatar" />
                        <div className="flex-1">
                            <p className="font-semibold text-sm mb-0.5 text-blue-700 dark:text-blue-400 cursor-pointer">{post.author}</p>
                            <p className="text-xs text-slate-500 dark:text-slate-400 mb-0.5">{post.role}</p>
                            <p className="text-[11px] text-slate-500 dark:text-slate-400 flex items-center gap-1">
                                Rascunho • <Globe className="w-3 h-3" />
                            </p>
                        </div>
                        <MoreHorizontal className="w-5 h-5 text-slate-500 cursor-pointer" />
                    </div>
                    <p className="text-[13px] px-4 pb-3 leading-relaxed whitespace-pre-wrap">{captionText}</p>
                    <div className="border-y border-slate-300 dark:border-[#38434F]">
                        <img src={post.imageUrl} onError={(e) => handleImgErr(e, post.fallbackUrl)} className="w-full object-contain max-h-[400px] bg-slate-100 dark:bg-black block" alt="Post" />
                    </div>
                    <div className="flex px-2 py-1">
                        {[['Gostei', ThumbsUp], ['Comentar', MessageCircle], ['Enviar', Send]].map(([label, Icon]) => (
                            <button key={label} className="flex-1 flex items-center justify-center gap-1.5 py-3 text-[13px] font-semibold text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-white/5 rounded-md transition-colors">
                                <Icon className="w-[18px] h-[18px]" /> {label}
                            </button>
                        ))}
                    </div>
                </div>
            );
        };

        const PostFeedback = ({ postId, user }) => {
            const [comments, setComments] = useState([]);
            const [newComment, setNewComment] = useState('');
            const [sending, setSending] = useState(false);

            useEffect(() => {
                if (!user || !db) return;
                try {
                    const ref = collection(db, 'artifacts', appId, 'public', 'data', `post_comments_${postId}`);
                    const unsub = onSnapshot(ref, snap => {
                        const data = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                        data.sort((a, b) => (b.createdAt?.toMillis() || 0) - (a.createdAt?.toMillis() || 0));
                        setComments(data);
                    }, err => console.error(err));
                    return () => unsub();
                } catch(e) { console.error("Erro Firestore", e); }
            }, [user, postId]);

            const submit = async (e) => {
                e.preventDefault();
                if (!newComment.trim() || !user || !db) return;
                setSending(true);
                try {
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', `post_comments_${postId}`), {
                        text: newComment,
                        userId: user.uid,
                        userName: user.isAnonymous ? 'Equipe (Visitante)' : (user.displayName || 'Usuário'),
                        userPhoto: user.photoURL || `https://ui-avatars.com/api/?name=${(user.displayName || 'U').charAt(0)}&background=153D56&color=fff`,
                        createdAt: serverTimestamp()
                    });
                    setNewComment('');
                } catch (e) { console.error(e); }
                setSending(false);
            };

            const isGoogle = user && !user.isAnonymous;

            return (
                <div className="border-t border-slate-200 dark:border-darkBorder">
                    {/* Barra de Aprovação Rápida */}
                    <div className="flex flex-wrap items-center justify-between gap-4 p-5 md:px-7 md:py-5 bg-emerald-50/50 dark:bg-emerald-900/10 border-b border-slate-200 dark:border-darkBorder">
                        <div>
                            <p className="font-bold text-[15px] flex items-center gap-2 m-0 text-slate-900 dark:text-slate-200">
                                <CheckCircle2 className="w-4 h-4 text-emerald-500" /> Aprovar ou Solicitar Ajustes
                            </p>
                            <p className="text-[13px] text-slate-500 dark:text-slate-400 mt-1">
                                Comunique-se com o produtor via canal preferido.
                            </p>
                        </div>
                        <div className="flex gap-2.5 w-full md:w-auto">
                            <a 
                                href={`https://wa.me/5531985547183?text=Olá Felipe! Sobre o post ${postId}...`}
                                target="_blank" rel="noreferrer"
                                className="flex-1 md:flex-none flex items-center justify-center gap-2 bg-emerald-500 hover:bg-emerald-600 text-white px-4 py-2 rounded-xl font-bold text-[13px] transition-colors shadow-sm"
                            >
                                <Phone className="w-3.5 h-3.5" /> WhatsApp
                            </a>
                            <a 
                                href={`mailto:canellifelipe@gmail.com?subject=Aprovação - Post ${postId}`}
                                className="flex-1 md:flex-none flex items-center justify-center gap-2 bg-white dark:bg-white/5 border border-slate-300 dark:border-slate-600 text-slate-800 dark:text-slate-200 hover:bg-slate-50 dark:hover:bg-white/10 px-4 py-2 rounded-xl font-bold text-[13px] transition-colors shadow-sm"
                            >
                                <Mail className="w-3.5 h-3.5" /> E-mail
                            </a>
                        </div>
                    </div>

                    {/* Sessão de Comentários */}
                    <div className="p-6 md:px-7 bg-slate-50/50 dark:bg-transparent">
                        <h4 className="text-sm font-bold flex items-center gap-2 mb-4 text-slate-800 dark:text-slate-200">
                            <MessageSquare className="w-4 h-4 text-brand-darkGreen dark:text-brand-lightBlue" /> 
                            Comentários & Notas Internas
                        </h4>

                        <div className="bg-white dark:bg-white/5 border border-slate-200 dark:border-darkBorder rounded-2xl p-4 mb-5 shadow-sm">
                            {!isGoogle ? (
                                <div className="text-center py-3">
                                    <p className="text-[13px] text-slate-500 dark:text-slate-400">
                                        Faça login com Google no topo da página para adicionar notas ou pedir ajustes.
                                    </p>
                                </div>
                            ) : (
                                <form onSubmit={submit} className="flex gap-3 items-start">
                                    <img src={user.photoURL} alt="" className="w-8 h-8 rounded-full shrink-0 shadow-sm" />
                                    <div className="flex-1">
                                        <textarea
                                            value={newComment}
                                            onChange={e => setNewComment(e.target.value)}
                                            placeholder="Adicione uma nota, ideia ou pedido de ajuste..."
                                            className="w-full p-3 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-900/50 text-slate-900 dark:text-white text-[13px] placeholder:text-slate-400 resize-none h-20 focus:outline-none focus:ring-2 focus:ring-brand-lightBlue focus:border-transparent transition-all"
                                        ></textarea>
                                        <div className="flex justify-end mt-2">
                                            <button 
                                                type="submit" 
                                                disabled={sending || !newComment.trim()}
                                                className={`px-4 py-2 rounded-lg font-bold text-[13px] transition-all ${
                                                    (!sending && newComment.trim()) 
                                                    ? 'bg-brand-darkBlue dark:bg-brand-lightBlue text-white dark:text-slate-900 shadow-sm hover:opacity-90' 
                                                    : 'bg-slate-200 dark:bg-slate-800 text-slate-400 cursor-not-allowed'
                                                }`}
                                            >
                                                {sending ? 'Enviando...' : 'Postar Nota'}
                                            </button>
                                        </div>
                                    </div>
                                </form>
                            )}
                        </div>

                        <div className="flex flex-col gap-3">
                            {comments.length === 0 ? (
                                <p className="text-[13px] text-slate-500 dark:text-slate-400 italic">Nenhuma nota adicionada ainda para esta publicação.</p>
                            ) : comments.map(c => (
                                <div key={c.id} className="flex gap-3 p-4 bg-white dark:bg-white/5 border border-slate-200 dark:border-darkBorder rounded-xl shadow-sm">
                                    <img src={c.userPhoto} alt="" className="w-8 h-8 rounded-full shrink-0 shadow-sm" />
                                    <div>
                                        <div className="flex items-center gap-2 mb-1">
                                            <span className="font-bold text-[13px] text-slate-900 dark:text-slate-200">{c.userName}</span>
                                            <span className="text-[11px] text-slate-500">
                                                {c.createdAt ? new Date(c.createdAt.toMillis()).toLocaleString('pt-BR') : 'agora'}
                                            </span>
                                        </div>
                                        <p className="text-[13px] text-slate-600 dark:text-slate-300 leading-relaxed whitespace-pre-wrap">{c.text}</p>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        };

        const PostItem = ({ post, user }) => {
            const [tab, setTab] = useState('instagram');

            return (
                <article className="bg-white dark:bg-darkCard rounded-3xl border border-slate-200 dark:border-darkBorder shadow-xl shadow-slate-200/50 dark:shadow-black/40 overflow-hidden mb-12 transition-all duration-300">
                    
                    {/* Header do Card */}
                    <div className="flex flex-wrap items-center justify-between gap-4 p-5 md:px-7 md:py-5 border-b border-slate-200 dark:border-darkBorder">
                        <div className="flex items-center gap-3.5">
                            <div className="w-12 h-12 rounded-xl overflow-hidden shrink-0 bg-slate-50 dark:bg-white/5 border border-slate-200 dark:border-slate-800 flex items-center justify-center p-0.5">
                                <img src={post.avatar} alt="Avatar" className="w-full h-full object-contain rounded-lg" />
                            </div>
                            <div>
                                <h3 className="font-bold text-[16px] text-slate-900 dark:text-slate-100">{post.title}</h3>
                                <p className="text-xs text-slate-500 dark:text-slate-400 flex items-center gap-1.5 mt-0.5">
                                    <Clock className="w-3 h-3" /> {post.date} • {post.platform}
                                </p>
                            </div>
                        </div>
                        <StatusBadge status={post.status} label={post.statusLabel} />
                    </div>

                    {/* Divisão Grid 1x2 (Mockup / Detalhes) */}
                    <div className="grid grid-cols-1 lg:grid-cols-[minmax(0,1fr)_minmax(0,1.2fr)]">
                        
                        {/* Lado Esquerdo: Simulador da Rede Social */}
                        <div className="bg-slate-50 dark:bg-slate-900/50 lg:border-r border-slate-200 dark:border-darkBorder flex flex-col">
                            {/* Abas Mockup */}
                            <div className="flex border-b border-slate-200 dark:border-darkBorder bg-white dark:bg-darkCard sticky top-0 z-10">
                                {[['instagram', Instagram, 'Instagram'], ['linkedin', Linkedin, 'LinkedIn']].map(([id, Icon, label]) => (
                                    <button 
                                        key={id} 
                                        onClick={() => setTab(id)} 
                                        className={`flex-1 flex items-center justify-center gap-2 py-4 text-[13px] font-bold transition-all border-b-2 ${
                                            tab === id 
                                                ? 'border-brand-darkGreen dark:border-brand-lightBlue text-brand-darkGreen dark:text-brand-lightBlue bg-slate-50/50 dark:bg-white/5' 
                                                : 'border-transparent text-slate-500 hover:text-slate-700 dark:hover:text-slate-300'
                                        }`}
                                    >
                                        <Icon className="w-4 h-4" /> {label}
                                    </button>
                                ))}
                            </div>
                            
                            {/* Área do Mockup */}
                            <div className="p-6 md:p-8 flex justify-center items-start min-h-[550px] overflow-y-auto">
                                {tab === 'instagram' ? <InstagramMockup post={post} /> : <LinkedinMockup post={post} />}
                            </div>
                        </div>

                        {/* Lado Direito: Nota Estratégica e Downloads */}
                        <div className="flex flex-col p-6 md:p-8 lg:p-10">
                            
                            {/* Bloco Nota Estratégica */}
                            <div className="mb-8">
                                <h4 className="text-xs font-bold uppercase tracking-widest text-amber-700 dark:text-amber-400 flex items-center gap-2 mb-4">
                                    <Lightbulb className="w-4 h-4" /> Nota Estratégica
                                </h4>
                                <div className="bg-amber-50 dark:bg-amber-400/10 border border-amber-200 dark:border-amber-400/20 rounded-2xl p-5 md:p-6 relative shadow-sm">
                                    <div className="absolute left-0 top-0 bottom-0 w-1.5 rounded-l-2xl bg-amber-500"></div>
                                    <p className="text-[13px] leading-relaxed text-amber-900 dark:text-amber-100 whitespace-pre-wrap ml-2 m-0">
                                        {post.marketingNote}
                                    </p>
                                </div>
                            </div>

                            {/* Botão Download Base */}
                            <div className="pt-6 mt-auto border-t border-slate-200 dark:border-darkBorder">
                                <button 
                                    onClick={() => handleDownload(post.imageUrl, post.fallbackUrl, `${post.title}.jpg`)}
                                    className="w-full flex items-center justify-center gap-2.5 bg-brand-darkBlue dark:bg-brand-lightBlue text-white dark:text-slate-900 hover:opacity-90 px-6 py-4 rounded-2xl font-bold text-[15px] transition-all shadow-md active:scale-[0.98]"
                                >
                                    <Download className="w-5 h-5" /> Baixar Imagem Base
                                </button>
                                <p className="text-center text-xs font-medium text-slate-500 mt-3">
                                    Arquivo nativo para montagem da arte final.
                                </p>
                            </div>
                        </div>
                    </div>

                    <PostFeedback postId={post.id} user={user} />
                </article>
            );
        };

        function App() {
            const [isDark, setIsDark] = useState(false);
            const [user, setUser] = useState(null);
            const [authError, setAuthError] = useState('');

            // Gerencia classe Dark Mode no root e no tailwind
            useEffect(() => {
                if (isDark) {
                    document.documentElement.classList.add('dark');
                } else {
                    document.documentElement.classList.remove('dark');
                }
            }, [isDark]);

            // Inicialização Global
            useEffect(() => {
                const init = async () => {
                    // Evita o erro de API key inválida no console se o Firebase não estiver configurado
                    if (!auth || firebaseConfig.apiKey === "SUA_API_KEY_AQUI") return;
                    
                    try {
                        await signInAnonymously(auth);
                    } catch (e) { console.error("Erro na autenticação anônima", e); }
                };
                init();
                
                if (auth && firebaseConfig.apiKey !== "SUA_API_KEY_AQUI") {
                    return onAuthStateChanged(auth, setUser);
                }
            }, []);

            const loginGoogle = async () => {
                setAuthError('');
                if(!auth || firebaseConfig.apiKey === "SUA_API_KEY_AQUI") {
                    setAuthError("Erro: O Firebase não está configurado. Insira suas credenciais em 'firebaseConfig' no código.");
                    return;
                }
                try {
                    const provider = new GoogleAuthProvider();
                    await signInWithPopup(auth, provider);
                }
                catch(e) { 
                    console.error('Erro de login:', e); 
                    setAuthError('Falha ao autenticar com o Google. Verifique o console ou a configuração dos domínios.');
                }
            };

            const logout = async () => {
                if(!auth) return;
                await signOut(auth);
                await signInAnonymously(auth);
            };

            const isGoogleUser = user && !user.isAnonymous;

            return (
                <div className="min-h-screen bg-[#F0F4F8] dark:bg-darkBg text-slate-900 dark:text-white transition-colors duration-300 font-sans">
                    
                    {/* Topbar Fixa */}
                    <header className="sticky top-0 z-50 bg-white/95 dark:bg-[#151F2E]/95 backdrop-blur-xl border-b border-slate-200 dark:border-darkBorder transition-colors">
                        <div className="max-w-[1200px] mx-auto px-4 md:px-6 h-16 flex items-center justify-between gap-4">
                            
                            {/* Logo & Marca */}
                            <div className="flex items-center gap-4">
                                <img 
                                    src={logoUrl} 
                                    alt="Hidrogest" 
                                    className="h-10 object-contain dark:brightness-0 dark:invert opacity-100 dark:opacity-90"
                                />
                                <div className="hidden sm:block border-l border-slate-200 dark:border-slate-700 pl-4 py-1">
                                    <h1 className="font-extrabold text-[15px] leading-tight text-slate-900 dark:text-white tracking-tight">Sistema de Aprovação</h1>
                                    <p className="text-[11px] font-medium text-slate-500 dark:text-slate-400">Copywriting & Conteúdo</p>
                                </div>
                            </div>

                            {/* Controles: Login & Tema */}
                            <div className="flex items-center gap-3 md:gap-4">
                                <div className="hidden sm:flex items-center gap-1.5 px-3 py-1.5 rounded-full bg-amber-50 dark:bg-amber-400/10 border border-amber-200 dark:border-amber-400/20 text-xs font-bold text-amber-700 dark:text-amber-400">
                                    <AlertCircle className="w-3.5 h-3.5" />
                                    <span>{portfolioData.length} pendente{portfolioData.length !== 1 ? 's' : ''}</span>
                                </div>

                                {isGoogleUser ? (
                                    <div className="flex items-center gap-3 pr-2 border-r border-slate-200 dark:border-slate-700">
                                        <img src={user.photoURL} className="w-8 h-8 rounded-full border border-slate-200 dark:border-slate-700 shadow-sm" alt="Perfil" />
                                        <button 
                                            onClick={logout} 
                                            className="text-slate-500 hover:text-slate-900 dark:text-slate-400 dark:hover:text-white transition-colors"
                                            title="Sair"
                                        >
                                            <LogOut className="w-4 h-4" />
                                        </button>
                                    </div>
                                ) : (
                                    <button 
                                        onClick={loginGoogle}
                                        className="flex items-center gap-2 bg-white dark:bg-white/5 border border-slate-300 dark:border-slate-600 text-slate-800 dark:text-white hover:bg-slate-50 dark:hover:bg-white/10 px-3 py-1.5 rounded-lg text-xs font-bold transition-colors shadow-sm"
                                    >
                                        <img src="https://www.svgrepo.com/show/475656/google-color.svg" className="w-3.5 h-3.5" alt="Google" />
                                        <span className="hidden sm:inline">Entrar Equipe</span>
                                    </button>
                                )}

                                <button 
                                    onClick={() => setIsDark(!isDark)}
                                    className="w-9 h-9 flex items-center justify-center rounded-xl bg-slate-100 dark:bg-white/5 border border-slate-200 dark:border-slate-700 text-slate-500 hover:text-slate-800 dark:text-amber-400 transition-colors shadow-sm"
                                    title="Alternar Tema"
                                >
                                    {isDark ? <Sun className="w-4 h-4" /> : <Moon className="w-4 h-4" />}
                                </button>
                            </div>
                        </div>
                    </header>

                    {/* Conteúdo Principal */}
                    <main className="max-w-[1200px] mx-auto px-4 md:px-6 pt-10 pb-20">
                        
                        {/* Mensagem de Erro de Autenticação */}
                        {authError && (
                            <div className="bg-rose-100 dark:bg-rose-900/30 border border-rose-200 dark:border-rose-800 text-rose-800 dark:text-rose-200 p-4 rounded-xl mb-6 flex justify-between items-start shadow-sm animate-in fade-in slide-in-from-top-4">
                                <span className="text-sm font-medium">{authError}</span>
                                <button onClick={() => setAuthError('')} className="p-1 hover:bg-rose-200 dark:hover:bg-rose-800 rounded-md transition-colors">
                                    <X className="w-4 h-4" />
                                </button>
                            </div>
                        )}

                        {/* Título & Resumo */}
                        <div className="flex flex-col md:flex-row md:items-end justify-between gap-6 mb-10">
                            <div>
                                <h2 className="text-3xl font-extrabold tracking-tight mb-2 text-slate-900 dark:text-white">
                                    Publicações para Revisão
                                </h2>
                                <p className="text-sm font-medium text-slate-500 dark:text-slate-400 max-w-xl">
                                    Analise os mockups, leia as notas estratégicas e valide o conteúdo ou solicite ajustes diretos para a equipe de produção.
                                </p>
                            </div>
                            
                            <div className="flex gap-3">
                                {[['Pendentes', portfolioData.filter(p => p.status === 'pending').length, isDark ? 'text-amber-400' : 'text-amber-600'], 
                                  ['Total', portfolioData.length, isDark ? 'text-brand-lightBlue' : 'text-brand-darkBlue']].map(([lbl, val, colClass], i) => (
                                    <div key={i} className="bg-white dark:bg-white/5 border border-slate-200 dark:border-darkBorder rounded-2xl px-5 py-3 text-center min-w-[90px] shadow-sm">
                                        <span className={`block text-2xl font-black mb-0.5 ${colClass}`}>{val}</span>
                                        <span className="text-[11px] font-bold text-slate-500 uppercase tracking-wider">{lbl}</span>
                                    </div>
                                ))}
                            </div>
                        </div>

                        {/* Lista de Cards */}
                        <div className="space-y-12">
                            {portfolioData.map(post => (
                                <PostItem key={post.id} post={post} user={user} />
                            ))}
                        </div>

                        {/* Rodapé Interno */}
                        <footer className="text-center mt-16 text-xs font-semibold text-slate-400 dark:text-slate-500">
                            Sistema de Produção e Aprovação de Conteúdo • Desenvolvido para Felipe Canelli
                        </footer>
                    </main>
                </div>
            );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
